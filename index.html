<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍷 Drop of the Gods</title>
  <style>
    :root {
      --bg-top: #1f130c;
      --bg-bottom: #120b07;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #f8ecdf;
      --muted: #d6bda6;
      --accent: #ff9a3d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      --bg-image: none;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background-color: #120b07;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      background-image:
        linear-gradient(135deg, rgba(67, 35, 5, 0.6), rgba(32, 24, 8, 0.9)),
        var(--bg-image);
    }

    .panel {
      width: min(700px, 100%);
      padding: 3rem;
      border-radius: 1.25rem;
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(2rem, 4vw, 2.6rem);
    }

    p {
      margin: 0.85rem 0 1.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .links {
      display: grid;
      gap: 1.5rem;
    }

    a {
      display: block;
      color: var(--text);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 0.8rem;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.85rem 1rem;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    a:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>🍷 Drop of the Gods</h1>
    <nav class="links">
      <a href="./recipes/cocktails.html">🍹 Copcktail Recipes</a>
      <a href="./brix/brix.html">🧪 Brix Calculator</a>
    </nav>
  </main>
  <script>
    const backgroundImages = [
      "./images/bar0.jpg",
      "./images/bar1.jpg",
      "./images/bar2.jpg",
      "./images/bar3.jpg",
      "./images/bar4.jpg",
      "./images/bar5.jpg",
      "./images/bar6.jpg"
    ];

    const randomImage = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
    document.body.style.setProperty("--bg-image", "url('" + randomImage + "')");
  </script>
</body>
</html>
