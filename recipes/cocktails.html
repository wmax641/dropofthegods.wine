<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍹 Cocktail Recipes 🍸</title>
  <style>
    :root {
      --bg-1: #120f0b;
      --bg-2: #26160f;
      --panel: rgba(25, 18, 14, 0.85);
      --panel-border: rgba(255, 214, 168, 0.14);
      --text: #f3e9dc;
      --muted: #d9c1a5;
      --accent: #ff9f45;
      --accent-deep: #ff6d1f;
      --chip: rgba(255, 159, 69, 0.14);
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 159, 69, 0.18), transparent 32%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 2rem 1.25rem 3rem;
    }

    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav a.nav-main {
      width: 2.4rem;
      height: 2.4rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
    }

    .nav a.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #1a120c;
      font-weight: 700;
    }

    .hero {
      padding: 2rem;
      border-radius: 1.75rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: 0 24px 60px var(--shadow);
      margin-bottom: 1.5rem;
    }

    .eyebrow {
      margin: 0 0 0.6rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 1.78rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3.0 rem);
      line-height: 0.95;
    }

    .hero p {
      width: min(640px, 100%);
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .filters {
      display: grid;
      gap: 1rem;
      margin-bottom: 1.5rem;
      position: sticky;
      top: 0.75rem;
      z-index: 25;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 1.25rem;
      padding: 1rem 1.1rem;
      box-shadow: 0 18px 45px var(--shadow);
      backdrop-filter: blur(10px);
    }

    .filters-toggle {
      display: none;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 0.85rem;
      padding: 0.5rem 0.7rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .filters-content {
      display: grid;
      gap: 1rem;
    }

    .filters-toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.35rem;
      min-height: 1.35rem;
      padding: 0.1rem 0.35rem;
      border-radius: 999px;
      background: #fff;
      color: #111;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .filter-label {
      display: block;
      min-width: 100px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-label-wrap {
      display: inline-flex;
      align-items: flex-start;
      gap: 0.35rem;
      position: relative;
    }

    .filter-help {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      height: 1rem;
      border-radius: 999px;
      border: 1px solid rgba(233, 200, 180, 0.2);
      color: rgba(233, 200, 180, 0.5);
      font-size: 0.68rem;
      line-height: 1;
      cursor: help;
      transform: translateY(-0.25rem);
      user-select: none;
    }

    .filter-help::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 0;
      bottom: calc(100% + 0.55rem);
      transform: translateY(0.2rem);
      min-width: 180px;
      max-width: min(240px, calc(100vw - 2rem));
      padding: 0.5rem 0.65rem;
      border-radius: 0.7rem;
      background: rgba(8, 8, 8, 0.92);
      color: #f6f0e8;
      text-transform: none;
      letter-spacing: normal;
      font-size: 0.75rem;
      line-height: 1.35;
      white-space: normal;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 6;
    }

    .filter-help::before {
      content: "";
      position: absolute;
      left: 0.52rem;
      bottom: calc(100% + 0.22rem);
      transform: translateY(0.2rem);
      border-width: 0.32rem;
      border-style: solid;
      border-color: rgba(8, 8, 8, 0.92) transparent transparent transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 6;
    }

    .filter-help.tooltip-below::after {
      top: calc(100% + 0.55rem);
      bottom: auto;
    }

    .filter-help.tooltip-below::before {
      top: calc(100% + 0.22rem);
      bottom: auto;
      border-color: transparent transparent rgba(8, 8, 8, 0.92) transparent;
    }

    .filter-help:hover::after,
    .filter-help:hover::before,
    .filter-help:focus-visible::after,
    .filter-help:focus-visible::before {
      opacity: 1;
      transform: translateY(0);
    }

    .filter-line {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .filter-button {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.55rem 0.85rem;
      font: 0.5em;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .filter-button:focus-visible {
      outline: none;
    }

    .style-filter {
      color: var(--accent);
    }

    .style-filter:hover,
    .style-filter:focus-visible {
      border-color: rgba(255, 159, 69, 0.34);
      color: var(--accent);
    }

    .style-filter.active {
      background: var(--chip);
      border-color: rgba(255, 159, 69, 0.2);
      color:  rgb(255, 255, 255);
    }

    .base-filter {
        color: #9fd0ff;
    }
    .base-filter:hover,
    .base-filter:focus-visible {
      border-color: rgba(120, 190, 255, 0.34);
      color: #9fd0ff;
    }

    .base-filter.active {
      background: rgba(120, 190, 255, 0.14);
      border-color: rgba(120, 190, 255, 0.2);
      color:  rgb(255, 255, 255);
    }

    .category-filter {
      color: #b7f0bc;
    }

    .category-filter:hover,
    .category-filter:focus-visible {
      border-color: rgba(180, 255, 184, 0.34);
      color: #b7f0bc;
    }

    .category-filter.active {
      background: rgba(180, 255, 184, 0.14);
      border-color: rgba(180, 255, 184, 0.2);
      color:  rgb(255, 255, 255);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }

    .card {
      --card-pad-top: 1.1rem;
      --card-pad-x: 1.4rem;
      --card-pad-bottom: 1.4rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 1.4rem;
      padding: var(--card-pad-top) var(--card-pad-x) var(--card-pad-bottom);
      box-shadow: 0 18px 45px var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow: hidden;
    }

    .image-wrap {
      position: relative;
      width: calc(100% + (var(--card-pad-x) * 2));
      margin: calc(var(--card-pad-top) * -1) calc(var(--card-pad-x) * -1) 0;
      background: var(--panel);
      border-radius: 0;
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      aspect-ratio: 5 / 4;
      object-fit: cover;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.04);
      border: 0;
      display: block;
    }

    .image-title {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin: 0;
      padding: 5.0rem 1rem 1rem;
      border-radius: 0;
      background: linear-gradient(to top, rgba(25, 18, 14, 1), rgba(25, 18, 14, 0));
      font-size: 1.8rem;
      line-height: 1.1;
    }

    .title-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .title-row.has-note {
      cursor: help;
    }

    .card-header {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card h2 {
      margin: 0;
      font-size: 1.8rem;
    }

    .note-badge {
      flex: 0 0 auto;
      font-size: 1.25rem;
      line-height: 1;
    }

    .title-note-tooltip {
      position: absolute;
      left: 0;
      bottom: calc(100% + 0.65rem);
      min-width: 300px;
      max-width: 350px;
      padding: 0.55rem 0.7rem;
      border-radius: 0.75rem;
      background: rgba(8, 8, 8, 0.92);
      color: #f6f0e8;
      font-size: 1.0rem;
      line-height: 1.4;
      white-space: normal;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      transform: translateY(0.2rem);
      z-index: 3;
    }

    .title-note-arrow {
      position: absolute;
      left: 0.45rem;
      bottom: calc(100% + 0.3rem);
      border-width: 0.35rem;
      border-style: solid;
      border-color: rgba(8, 8, 8, 0.92) transparent transparent transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      transform: translateY(0.2rem);
      z-index: 3;
    }

    .title-row.has-note:hover .title-note-tooltip,
    .title-row.has-note:hover .title-note-arrow,
    .title-row.has-note:focus-visible .title-note-tooltip,
    .title-row.has-note:focus-visible .title-note-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      position: static;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: help;
    }

    .chip-tooltip {
      position: absolute;
      left: 0;
      bottom: calc(100% + 0.65rem);
      transform: translateY(0.2rem);
      min-width: 150px;
      max-width: 220px;
      padding: 0.55rem 0.7rem;
      border-radius: 0.75rem;
      background: rgba(8, 8, 8, 0.92);
      color: #f6f0e8;
      text-transform: none;
      letter-spacing: normal;
      font-size: 1.0rem;
      line-height: 1.4;
      white-space: normal;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 2;
    }

    .chip-tooltip-arrow {
      position: absolute;
      left: 0.45rem;
      bottom: calc(100% + 0.3rem);
      transform: translateY(0.2rem);
      border-width: 0.35rem;
      border-style: solid;
      border-color: rgba(8, 8, 8, 0.92) transparent transparent transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 2;
    }

    .chip:hover .chip-tooltip,
    .chip:hover .chip-tooltip-arrow,
    .chip:focus-visible .chip-tooltip,
    .chip:focus-visible .chip-tooltip-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    .style-chip {
      background: var(--chip);
      color: var(--accent);
    }

    .base-chip {
      background: rgba(120, 190, 255, 0.14);
      color: #9fd0ff;
    }

    .category-chip {
      background: rgba(180, 255, 184, 0.14);
      color: #b7f0bc;
    }

    .section-title {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    li,
    .method {
      color: var(--muted);
      line-height: 1.55;
    }

    ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .footer-note {
      margin-top: 1.5rem;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .status {
      padding: 1rem 1.2rem;
      border-radius: 1rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      box-shadow: 0 18px 45px var(--shadow);
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem 0.8rem 2rem;
      }

      .filters {
        top: 0.4rem;
        margin-bottom: 1rem;
        border-radius: 0.95rem;
        padding: 0.6rem 0.7rem;
        gap: 0.65rem;
      }

      .filters-toggle {
        display: flex;
      }

      .filters-content {
        overflow: visible;
        max-height: 38rem;
        opacity: 1;
        transform: translateY(0);
        transition: max-height 0.4s ease, opacity 0.18s ease, transform 0.18s ease;
      }

      .filters.is-collapsed .filters-content {
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transform: translateY(-0.35rem);
        pointer-events: none;
      }

      .filters.is-collapsed .filters-toggle-icon {
        transform: rotate(-180deg);
      }

      .filter-line {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.45rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .card {
        --card-pad-top: 0.8rem;
        --card-pad-x: 1.1rem;
        --card-pad-bottom: 1.1rem;
        padding: var(--card-pad-top) var(--card-pad-x) var(--card-pad-bottom);
      }

      .image-wrap {
        width: calc(100% + (var(--card-pad-x) * 2));
        margin: calc(var(--card-pad-top) * -1) calc(var(--card-pad-x) * -1) 0;
      }
      .card-header {
        flex-direction: column;
      }

    }

    @media (min-width: 641px) and (max-width: 899px) {
      .card h2 {
        margin: 0;
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="nav" aria-label="Site navigation">
      <a href="../index.html" class="nav-main" aria-label="Main" title="Main">💧</a>
      <a href="../brix/brix.html">🧪 Brix Calculator</a>
      <a href="./cocktails.html" class="active">🍹 Cocktail Recipes</a>
    </nav>

    <section class="hero">
      <p class="eyebrow">dropofthegods</p>
      <h1>Cocktail Recipes</h1>
    </section>

    <section class="filters" id="filters" aria-label="Recipe filters">
      <button type="button" class="filters-toggle" id="filtersToggle" aria-expanded="true" aria-controls="filtersContent">
        <span>Filters</span>
        <span class="filters-toggle-icon" aria-hidden="true">▾</span>
      </button>
      <div class="filters-content" id="filtersContent"></div>
    </section>

    <section class="grid" id="recipeGrid" aria-label="Cocktail recipes">
      <div class="status">Loading recipes...</div>
    </section>

    <p class="footer-note">
      Brought to you by <code>dropofthegods</code>
    </p>
  </main>

  <script>
    const filtersRoot = document.getElementById("filters");
    const filtersContent = document.getElementById("filtersContent");
    const filtersToggle = document.getElementById("filtersToggle");
    const recipeGrid = document.getElementById("recipeGrid");
    const mobileFiltersQuery = window.matchMedia("(max-width: 640px)");
    const filterState = {
      style: null,
      base: null,
      category: null
    };
    let allRecipes = [];
    let autoCollapseArmed = true;
    let autoCollapseArmTimer = null;

    function formatAmount(value) {
      return Number.isInteger(value) ? String(value) : String(value).replace(/\.0$/, "");
    }

    function renderMethod(method) {
      if (Array.isArray(method)) {
        return method.map((step) => `<p>${step}</p>`).join("");
      }

      return method ?? "";
    }

    function renderIngredient(item) {
      if (typeof item === "string") {
        return item;
      }

      const amountText = item.amount !== undefined && item.amount !== null
        ? `<b>${formatAmount(item.amount)}</b>`
        : "";
      const typeText = item.type ? `<i>${item.type}</i>` : "";
      const ingredientText = item.ingredient ? `<b>${item.ingredient}</b>` : "";
      return [amountText, item.unit, typeText, ingredientText].filter(Boolean).join(" ");
    }

    function renderTitle(recipe, className = "") {
      const classes = `title-row${recipe.notes ? " has-note" : ""}${className ? ` ${className}` : ""}`;
      const noteAttrs = recipe.notes ? ` tabindex="0" aria-label="${recipe.name}. Note available."` : "";

      return `
        <div class="${classes}"${noteAttrs}>
          <h2>${recipe.name}</h2>
          ${recipe.notes ? `<span class="note-badge" aria-hidden="true">🗒️</span>` : ""}
          ${recipe.notes ? `<span class="title-note-tooltip" role="tooltip">${recipe.notes}</span><span class="title-note-arrow" aria-hidden="true"></span>` : ""}
        </div>
      `;
    }

    function renderChip(value, className, tooltip) {
      if (!value) {
        return "";
      }

      return `
        <span class="chip ${className}" tabindex="0">
          ${value}
          <span class="chip-tooltip" role="tooltip">${tooltip}</span>
          <span class="chip-tooltip-arrow" aria-hidden="true"></span>
        </span>
      `;
    }

    function renderChipRow(recipe) {
      const chips = [
        renderChip(recipe.style, "style-chip", "The foundational cocktail class"),
        renderChip(recipe.base, "base-chip", "The primary base liquor"),
        renderChip(recipe.category, "category-chip", "Category")
      ].filter(Boolean).join("");

      if (!chips) {
        return "";
      }

      return `<div class="chip-row">${chips}</div>`;
    }

    function isOtherValue(value) {
      return String(value).trim().toLowerCase() === "other";
    }

    function getUniqueValues(recipes, key, options = {}) {
      const { otherLast = false } = options;
      return [...new Set(recipes.map((recipe) => recipe[key]).filter(Boolean))]
        .sort((a, b) => {
          if (otherLast) {
            const aIsOther = isOtherValue(a);
            const bIsOther = isOtherValue(b);
            if (aIsOther && !bIsOther) return 1;
            if (!aIsOther && bIsOther) return -1;
          }
          return String(a).localeCompare(String(b), undefined, { sensitivity: "base" });
        });
    }

    const FILTER_HELP_TEXT = {
      style: "The foundational cocktail class",
      base: "The main type of liquor used",
      category: "'Classics' are my recipes for classics. 'Riffs' are cocktails that are slight modifications of a Classic Cocktail. 'Drop of the Gods' are original recipes."
    };

    function createFilterGroup(label, key, values, helpText = "") {
      return `
        <div class="filter-line">
          <span class="filter-label">
            <span class="filter-label-wrap">
              ${label}
              <span class="filter-help" tabindex="0" role="note" aria-label="${label} filter help" data-tooltip="${helpText}">?</span>
            </span>
          </span>
          <div class="filter-row">
            ${values.map((value) => `
              <button
                type="button"
                class="filter-button ${key}-filter ${filterState[key] === value ? "active" : ""}"
                data-filter-key="${key}"
                data-filter-value="${value}"
                aria-pressed="${filterState[key] === value ? "true" : "false"}"
              >
                ${value}
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function estimateFilterTooltipHeight(helpEl) {
      const tooltipText = helpEl.getAttribute("data-tooltip") || "";
      const estimatedWidth = Math.min(240, Math.max(180, Math.ceil(tooltipText.length * 5.4)));
      const charsPerLine = Math.max(24, Math.floor((estimatedWidth - 22) / 7));
      const lines = Math.max(1, Math.ceil(tooltipText.length / charsPerLine));
      return (lines * 16) + 24;
    }

    function updateFilterHelpTooltipPosition(helpEl) {
      const rect = helpEl.getBoundingClientRect();
      const tooltipHeight = estimateFilterTooltipHeight(helpEl);
      const spaceAbove = rect.top;
      const spaceBelow = window.innerHeight - rect.bottom;
      const shouldPlaceBelow = spaceAbove < (tooltipHeight + 12) && spaceBelow > spaceAbove;

      helpEl.classList.toggle("tooltip-below", shouldPlaceBelow);
    }

    function refreshActiveFilterHelpTooltips() {
      document.querySelectorAll(".filter-help").forEach((helpEl) => {
        if (helpEl.matches(":hover, :focus-visible")) {
          updateFilterHelpTooltipPosition(helpEl);
        }
      });
    }

    function renderFilters(recipes) {
      filtersContent.innerHTML = [
        createFilterGroup("Style", "style", getUniqueValues(recipes, "style"), FILTER_HELP_TEXT.style),
        createFilterGroup("Base", "base", getUniqueValues(recipes, "base", { otherLast: true }), FILTER_HELP_TEXT.base),
        createFilterGroup("Category", "category", getUniqueValues(recipes, "category"), FILTER_HELP_TEXT.category)
      ].join("");
    }

    function setFiltersCollapsed(isCollapsed) {
      filtersRoot.classList.toggle("is-collapsed", isCollapsed);
      filtersToggle.setAttribute("aria-expanded", String(!isCollapsed));
      filtersToggle.querySelector(".filters-toggle-icon").textContent = "▾";
    }

    function armMobileAutoCollapse(delayMs = 180) {
      autoCollapseArmed = false;
      if (autoCollapseArmTimer) {
        clearTimeout(autoCollapseArmTimer);
      }
      autoCollapseArmTimer = window.setTimeout(() => {
        autoCollapseArmed = true;
      }, delayMs);
    }

    function syncFiltersForViewport() {
      if (mobileFiltersQuery.matches) {
        setFiltersCollapsed(false);
        return;
      }
      setFiltersCollapsed(false);
    }

    function collapseMobileFiltersOnScroll() {
      if (!mobileFiltersQuery.matches) {
        return;
      }
      if (!autoCollapseArmed) {
        return;
      }
      if (filtersRoot.classList.contains("is-collapsed")) {
        return;
      }
      setFiltersCollapsed(true);
    }

    function getFilteredRecipes() {
      return allRecipes.filter((recipe) => {
        return ["style", "base", "category"].every((key) => {
          return filterState[key] === null || recipe[key] === filterState[key];
        });
      });
    }

    function renderRecipes(recipes) {
      if (!recipes.length) {
        recipeGrid.innerHTML = `<div class="status">No recipes match the current filters.</div>`;
        return;
      }

      recipeGrid.innerHTML = recipes.map((recipe) => `
        <article class="card">
          ${recipe.img ? `
            <div class="image-wrap">
              <img class="card-image" src="${recipe.img}" alt="${recipe.name}">
              <div class="image-title">
                ${renderTitle(recipe)}
                ${renderChipRow(recipe)}
              </div>
            </div>
          ` : ""}
          ${recipe.img ? "" : `
            <div class="card-header">
              ${renderTitle(recipe)}
              ${renderChipRow(recipe)}
            </div>
          `}
          <div>
            <span class="section-title">Ingredients</span>
            <ul>${recipe.ingredients.map((item) => `<li>${renderIngredient(item)}</li>`).join("")}</ul>
          </div>
          <div>
            <span class="section-title">Method</span>
            <div class="method">${renderMethod(recipe.method)}</div>
          </div>
        </article>
      `).join("");
    }

    function updateView() {
      renderFilters(allRecipes);
      renderRecipes(getFilteredRecipes());
    }

    filtersRoot.addEventListener("click", (event) => {
      const button = event.target.closest(".filter-button");
      if (!button) {
        return;
      }

      const { filterKey, filterValue } = button.dataset;
      filterState[filterKey] = filterState[filterKey] === filterValue ? null : filterValue;
      updateView();
    });

    filtersToggle.addEventListener("click", () => {
      const isCollapsed = filtersRoot.classList.contains("is-collapsed");
      setFiltersCollapsed(!isCollapsed);
      if (isCollapsed && mobileFiltersQuery.matches) {
        armMobileAutoCollapse();
      }
    });

    filtersRoot.addEventListener("pointerover", (event) => {
      const helpEl = event.target.closest(".filter-help");
      if (!helpEl) {
        return;
      }
      updateFilterHelpTooltipPosition(helpEl);
    });

    filtersRoot.addEventListener("focusin", (event) => {
      const helpEl = event.target.closest(".filter-help");
      if (!helpEl) {
        return;
      }
      updateFilterHelpTooltipPosition(helpEl);
    });

    mobileFiltersQuery.addEventListener("change", syncFiltersForViewport);
    window.addEventListener("scroll", collapseMobileFiltersOnScroll, { passive: true });
    window.addEventListener("scroll", refreshActiveFilterHelpTooltips, { passive: true });
    window.addEventListener("resize", refreshActiveFilterHelpTooltips);
    syncFiltersForViewport();

    const RECIPE_SOURCES = ["./classics.json", "./dropofthegods.json", "./riffs.json"];

    async function loadRecipeFile(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`${path} (HTTP ${response.status})`);
      }

      const parsed = await response.json();
      if (!Array.isArray(parsed)) {
        throw new Error(`${path} did not contain a JSON array`);
      }

      return parsed;
    }

    async function loadRecipes() {
      try {
        // Future-friendly: split recipes across files, then merge 📦
        const recipeLists = await Promise.all(RECIPE_SOURCES.map((path) => loadRecipeFile(path)));
        allRecipes = recipeLists
          .flat()
          .sort((a, b) => String(a?.name ?? "").localeCompare(String(b?.name ?? ""), undefined, { sensitivity: "base" }));
        updateView();
      } catch (error) {
        filtersContent.innerHTML = "";
        recipeGrid.innerHTML = `
          <div class="status">
            Unable to load recipes from <code>${RECIPE_SOURCES.join(", ")}</code>.<br>
            ${error.message}
          </div>
        `;
      }
    }

    loadRecipes();
  </script>
</body>
</html>
